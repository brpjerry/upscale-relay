name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e . pytest
      - name: Run tests
        env:
          # GitHub runners have no NVIDIA GPU; use the software HEVC encoder.
          RELAY_LOSSLESS_HEVC_PROFILE: x265-ultrafast
        run: python -m pytest tests -q

  windows-binary:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install lightweight server build dependencies
        run: python -m pip install ".[server-gui]" pyinstaller
      - name: Build console server binary
        run: >
          pyinstaller --noconfirm --onedir --console
          --name upscale-relay-server
          --collect-all pip
          --collect-submodules zeroconf
          packaging/server_entry.py
      - name: Build tray-GUI server binary
        run: >
          pyinstaller --noconfirm --onedir --windowed
          --name upscale-relay-server-gui
          --collect-all pip
          --collect-submodules zeroconf
          --collect-submodules relay_server
          packaging/server_gui_entry.py
      - name: Smoke test (console)
        shell: pwsh
        run: |
          $exe = "dist/upscale-relay-server/upscale-relay-server.exe"
          & $exe --help
          & $exe --upscale-infer-worker --check
          if ($LASTEXITCODE -ne 0) { throw "console worker dispatch check failed" }
          & $exe --check-nvidia-runtime-installer
          if ($LASTEXITCODE -ne 0) { throw "console runtime installer check failed" }
          $target = Join-Path $env:RUNNER_TEMP "console-pip-smoke"
          & $exe --smoke-nvidia-runtime-installer $target
          if ($LASTEXITCODE -ne 0 -or -not (Test-Path "$target/humanfriendly")) {
            throw "console frozen pip smoke failed"
          }
      - name: Smoke test (GUI import check)
        shell: pwsh
        timeout-minutes: 3
        run: |
          # --windowed exe: reaching exit 0 proves relay_server.tray and its
          # deps are bundled. A missing module instead pops a modal error dialog
          # and hangs, which the step timeout turns into a failure.
          $exe = "dist/upscale-relay-server-gui/upscale-relay-server-gui.exe"
          $p = Start-Process -FilePath $exe -ArgumentList "--check" -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "GUI --check failed with exit $($p.ExitCode)" }
          $p = Start-Process -FilePath $exe `
            -ArgumentList "--upscale-infer-worker", "--check" -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "GUI worker dispatch check failed with exit $($p.ExitCode)" }
          $p = Start-Process -FilePath $exe `
            -ArgumentList "--check-nvidia-runtime-installer" -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "GUI runtime installer check failed with exit $($p.ExitCode)" }
          $target = Join-Path $env:RUNNER_TEMP "gui-pip-smoke"
          $p = Start-Process -FilePath $exe `
            -ArgumentList "--smoke-nvidia-runtime-installer", $target -Wait -PassThru
          if ($p.ExitCode -ne 0 -or -not (Test-Path "$target/humanfriendly")) {
            throw "GUI frozen pip smoke failed with exit $($p.ExitCode)"
          }
          "GUI import check OK"
      - uses: actions/upload-artifact@v7
        with:
          name: upscale-relay-server-windows
          path: dist/upscale-relay-server/
      - uses: actions/upload-artifact@v7
        with:
          name: upscale-relay-server-gui-windows
          path: dist/upscale-relay-server-gui/
