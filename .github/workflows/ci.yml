name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e . pytest
      - name: Run tests
        env:
          # GitHub runners have no NVIDIA GPU; use the software HEVC encoder.
          RELAY_LOSSLESS_HEVC_PROFILE: x265-ultrafast
        run: python -m pytest tests -q

  windows-binary:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with DirectML runtime
        run: python -m pip install . onnxruntime-directml pyinstaller
      - name: Build server binary
        run: >
          pyinstaller --noconfirm --onedir --console
          --name upscale-relay-server
          --collect-all onnxruntime
          --collect-submodules zeroconf
          packaging/server_entry.py
      - name: Smoke test
        run: dist/upscale-relay-server/upscale-relay-server.exe --help
      - uses: actions/upload-artifact@v4
        with:
          name: upscale-relay-server-windows
          path: dist/upscale-relay-server/
