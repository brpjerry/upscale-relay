name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install with DirectML runtime and the tray GUI extra
        run: python -m pip install ".[server-gui]" onnxruntime-directml pyinstaller
      - name: Build console server binary
        run: >
          pyinstaller --noconfirm --onedir --console
          --name upscale-relay-server
          --collect-all onnxruntime
          --collect-submodules zeroconf
          packaging/server_entry.py
      - name: Build tray-GUI server binary
        run: >
          pyinstaller --noconfirm --onedir --windowed
          --name upscale-relay-server-gui
          --collect-all onnxruntime
          --collect-submodules zeroconf
          --collect-all PySide6
          --collect-submodules relay_server
          packaging/server_gui_entry.py
      - name: Smoke test (console)
        shell: pwsh
        run: |
          $exe = "dist/upscale-relay-server/upscale-relay-server.exe"
          & $exe --help
          & $exe --upscale-infer-worker --check
          if ($LASTEXITCODE -ne 0) { throw "console worker dispatch check failed" }
      - name: Smoke test (GUI import check)
        shell: pwsh
        timeout-minutes: 3
        run: |
          # --windowed exe: reaching exit 0 proves relay_server.tray and its
          # deps are bundled. A missing module instead pops a modal error dialog
          # and hangs, which the step timeout turns into a failure.
          $exe = "dist/upscale-relay-server-gui/upscale-relay-server-gui.exe"
          $p = Start-Process -FilePath $exe -ArgumentList "--check" -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "GUI --check failed with exit $($p.ExitCode)" }
          $p = Start-Process -FilePath $exe `
            -ArgumentList "--upscale-infer-worker", "--check" -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "GUI worker dispatch check failed with exit $($p.ExitCode)" }
          "GUI import check OK"
      - name: Package binaries
        shell: pwsh
        run: |
          Compress-Archive -Path dist/upscale-relay-server/* `
            -DestinationPath "dist/upscale-relay-server-$env:TAG-windows-x64.zip"
          Compress-Archive -Path dist/upscale-relay-server-gui/* `
            -DestinationPath "dist/upscale-relay-server-gui-$env:TAG-windows-x64.zip"
      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$env:TAG" `
            --title "Upscale Relay Server $env:TAG" `
            --generate-notes `
            --notes "Windows server binaries (DirectML/CPU runtime): -gui is the double-click tray app with a configuration pane; the plain build is the headless console server. The TensorRT path needs a CUDA source install." `
            (Get-Item dist/*.zip).FullName
