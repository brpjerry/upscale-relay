name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install with DirectML runtime
        run: python -m pip install . onnxruntime-directml pyinstaller
      - name: Build server binary
        run: >
          pyinstaller --noconfirm --onedir --console
          --name upscale-relay-server
          --collect-all onnxruntime
          --collect-submodules zeroconf
          packaging/server_entry.py
      - name: Smoke test
        run: dist/upscale-relay-server/upscale-relay-server.exe --help
      - name: Package binary
        shell: pwsh
        run: |
          Compress-Archive -Path dist/upscale-relay-server/* `
            -DestinationPath "dist/upscale-relay-server-$env:TAG-windows-x64.zip"
      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$env:TAG" `
            --title "Upscale Relay Server $env:TAG" `
            --generate-notes `
            --notes "Windows server binary (DirectML/CPU runtime). The TensorRT path needs a CUDA source install." `
            (Get-Item dist/*.zip).FullName
